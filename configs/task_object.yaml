camera:
  index: 0
  width: 640
  height: 480

run:
  max_frames: 150
  max_seconds: 10
  warmup_frames: 10
  show_preview: true
  log_dir: data/logs/object_recognition

task:
  name: object_recognition
  library: mediapipe
  libraries:
    - opencv
    - mediapipe

mediapipe:
  object_detector_model: models/mediapipe/efficientdet_lite0.tflite

opencv_dnn:
  model: models/opencv/frozen_inference_graph.pb
  config: models/opencv/ssd_mobilenet_v3_large_coco_2020_01_14.pbtxt
  confidence_threshold: 0.4
  nms_threshold: 0.4
  enforce_target_labels: true
  target_labels:
    - bottle
    - cup
    - book
    - cell phone
