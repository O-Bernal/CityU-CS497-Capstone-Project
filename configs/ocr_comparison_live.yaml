camera:
  index: 0
  width: 640
  height: 480

run:
  max_frames: 150
  max_seconds: 10
  warmup_frames: 10
  show_preview: true
  log_dir: data/logs/ocr_live

comparison:
  name: ocr_live_comparison
  max_frames: 150
  max_seconds: 10
  warmup_frames: 10
  repeats: 3
  interactive_conditions: true
  condition_preview: true
  pause_before_run: true
  show_preview: true
  log_dir: data/logs/ocr_live
  summary_dir: results/summaries
  task_libraries:
    ocr:
      - tesseract
      - easyocr
  conditions:
    - bright_handwritten_note_near
    - dim_handwritten_note_far

ocr:
  tesseract_cmd:
