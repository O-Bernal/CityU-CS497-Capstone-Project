camera:
  index: 0
  width: 640
  height: 480

run:
  max_frames: 180
  max_seconds: 6
  warmup_frames: 15
  show_preview: true
  record_video: false
  video_dir: data/captures/face_detection
  log_dir: data/logs/face_detection

comparison:
  name: face_detection_comparison
  max_seconds: 6
  warmup_frames: 15
  repeats: 1
  interactive_conditions: true
  condition_preview: true
  pause_before_run: true
  pause_after_run: false
  show_preview: true
  record_video: false
  video_dir: data/captures/face_detection
  log_dir: data/logs/face_detection
  summary_dir: results/summaries
  task_libraries:
    human_cues:
      - opencv
      - mediapipe
  conditions:
    - bright_clean
    - dim_cluttered_far

mediapipe:
  face_detector_model: models/mediapipe/blaze_face_short_range.tflite
